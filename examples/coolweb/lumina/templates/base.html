<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Lumina{% endblock %} — Lumina</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --bg-card: #13131a;
            --bg-card-hover: #1a1a24;
            --border: #232330;
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --accent-1: #6366f1;
            --accent-2: #a855f7;
            --accent-3: #06b6d4;
            --gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            --gradient-subtle: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(168,85,247,0.1));
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(99,102,241,0.15);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --max-w: 1200px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent-1); text-decoration: none; transition: color var(--transition); }
        a:hover { color: var(--accent-2); }

        .container { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; width: 100%; }

        /* ── Navigation ── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-brand {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
        .nav-links a {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color var(--transition);
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
        }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient);
            border-radius: 1px;
        }
        .visitor-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--gradient-subtle);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent-1);
            font-weight: 500;
        }
        .visitor-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Main ── */
        main { flex: 1; }

        /* ── Footer ── */
        .footer {
            border-top: 1px solid var(--border);
            padding: 2rem 0;
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-links { display: flex; gap: 1.5rem; list-style: none; }
        .footer-links a { color: var(--text-muted); font-size: 0.85rem; }
        .footer-links a:hover { color: var(--text); }

        /* ── Utility ── */
        .section { padding: 5rem 0; }
        .section-sm { padding: 3rem 0; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--gradient-subtle);
            color: var(--accent-1);
            border: 1px solid rgba(99,102,241,0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
        }
        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99,102,241,0.4);
            color: #fff;
        }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
            background: rgba(99,102,241,0.05);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            transition: all var(--transition);
        }
        .card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(99,102,241,0.3);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        .grid { display: grid; gap: 1.5rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }

        .text-gradient {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        .mb-4 { margin-bottom: 2rem; }
        .mt-2 { margin-top: 1rem; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .nav-links { gap: 1rem; }
            .section { padding: 3rem 0; }
            .grid-3 { grid-template-columns: 1fr; }
            .footer .container { flex-direction: column; gap: 1rem; text-align: center; }
        }

        /* ── Animations ── */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fade-in 0.6s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">Lumina</a>
            <ul class="nav-links">
                <li><a href="/" {% if title == "Lumina" %}class="active"{% endif %}>Home</a></li>
                <li><a href="/projects" {% if title == "Projects" %}class="active"{% endif %}>Projects</a></li>
                <li><a href="/about" {% if title == "About" %}class="active"{% endif %}>About</a></li>
                <li><a href="/contact" {% if title == "Contact" %}class="active"{% endif %}>Contact</a></li>
                <li>
                    <span class="visitor-badge">
                        <span class="visitor-dot"></span>
                        <span id="visitor-count">{{ visitors | default("0") }}</span> online
                    </span>
                </li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <span>Built with Avenir &amp; CoolWeb &mdash; 2026</span>
            <ul class="footer-links">
                <li><a href="/api/projects">API</a></li>
                <li><a href="/about">Team</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </div>
    </footer>

    <script>
    (function() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var ws = new WebSocket(proto + '//' + location.host + '/ws/visitors');
        var el = document.getElementById('visitor-count');
        ws.onmessage = function(e) {
            if (el) el.textContent = e.data;
        };
        ws.onclose = function() {
            setTimeout(function() {
                location.reload();
            }, 5000);
        };
    })();
    </script>
</body>
</html>
