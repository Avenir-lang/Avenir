{% extends "base.html" %}
{% block title %}Contact{% endblock %}
{% block content %}

<section class="section">
    <div class="container" style="max-width: 720px;">
        <div class="text-center mb-4 animate-in">
            <span class="badge mb-3" style="display: inline-block;">Get in Touch</span>
            <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em;">
                Let's <span class="text-gradient">Talk</span>
            </h1>
            <p class="text-muted mt-2">
                Have a question or want to work together? Drop us a message.
            </p>
        </div>

        <div class="card animate-in delay-1" style="padding: 2.5rem;">
            <form id="contact-form" onsubmit="return submitForm(event)">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">Name</label>
                    <input type="text" name="name" required placeholder="Your name"
                        style="width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.25s;"
                        onfocus="this.style.borderColor='var(--accent-1)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">Email</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                        style="width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.25s;"
                        onfocus="this.style.borderColor='var(--accent-1)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">Subject</label>
                    <input type="text" name="subject" placeholder="What is this about?"
                        style="width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.25s;"
                        onfocus="this.style.borderColor='var(--accent-1)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">Message</label>
                    <textarea name="message" required rows="5" placeholder="Tell us what you're thinking..."
                        style="width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; resize: vertical; transition: border-color 0.25s; min-height: 120px;"
                        onfocus="this.style.borderColor='var(--accent-1)'" onblur="this.style.borderColor='var(--border)'"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; justify-content: center;">
                    Send Message
                </button>
            </form>

            <div id="form-result" style="display: none; margin-top: 1.5rem; padding: 1.25rem; border-radius: var(--radius-sm); text-align: center; font-size: 0.95rem;"></div>
        </div>

        <div class="text-center mt-2 animate-in delay-2" style="margin-top: 2rem;">
            <p class="text-muted" style="font-size: 0.85rem;">
                This form posts to <a href="/api/contact" style="font-family: monospace;">/api/contact</a> &mdash; a JSON API endpoint powered by CoolWeb.
            </p>
        </div>
    </div>
</section>

<script>
function submitForm(e) {
    e.preventDefault();
    var form = document.getElementById('contact-form');
    var btn = document.getElementById('submit-btn');
    var result = document.getElementById('form-result');
    var data = {
        name: form.name.value,
        email: form.email.value,
        subject: form.subject.value,
        message: form.message.value
    };
    btn.textContent = 'Sending...';
    btn.disabled = true;
    fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
        result.style.display = 'block';
        if (res.success) {
            result.style.background = 'rgba(16,185,129,0.1)';
            result.style.border = '1px solid rgba(16,185,129,0.3)';
            result.style.color = '#10b981';
            result.textContent = res.message;
            form.reset();
        } else {
            result.style.background = 'rgba(244,63,94,0.1)';
            result.style.border = '1px solid rgba(244,63,94,0.3)';
            result.style.color = '#f43f5e';
            result.textContent = 'Something went wrong. Please try again.';
        }
        btn.textContent = 'Send Message';
        btn.disabled = false;
    })
    .catch(function() {
        result.style.display = 'block';
        result.style.background = 'rgba(244,63,94,0.1)';
        result.style.border = '1px solid rgba(244,63,94,0.3)';
        result.style.color = '#f43f5e';
        result.textContent = 'Network error. Please try again.';
        btn.textContent = 'Send Message';
        btn.disabled = false;
    });
    return false;
}
</script>

{% endblock %}
